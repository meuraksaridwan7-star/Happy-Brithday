<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --fg: #f5f0e8;
            --muted: #8a8a9a;
            --accent: #e8a857;
            --accent-rose: #d4a5a5;
            --card: rgba(18, 18, 26, 0.85);
            --border: rgba(232, 168, 87, 0.2);
            --glow: rgba(232, 168, 87, 0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--bg);
            color: var(--fg);
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        .font-display {
            font-family: 'Playfair Display', serif;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 10;
        }
        
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
        }
        
        .accent-glow {
            box-shadow: 0 0 60px var(--glow), 0 0 120px rgba(232, 168, 87, 0.2);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, var(--accent) 0%, #f5d89a 50%, var(--accent-rose) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .poem-line {
            opacity: 0;
            transform: translateY(20px);
            animation: revealLine 0.8s ease forwards;
        }
        
        @keyframes revealLine {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px var(--glow); }
            50% { box-shadow: 0 0 40px var(--glow), 0 0 60px rgba(232, 168, 87, 0.3); }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        .shimmer-text {
            background: linear-gradient(90deg, var(--accent) 0%, #fff 50%, var(--accent) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        
        .music-visualizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 40px;
        }
        
        .music-bar {
            width: 4px;
            background: linear-gradient(to top, var(--accent), var(--accent-rose));
            border-radius: 2px;
            animation: musicBounce 0.5s ease-in-out infinite alternate;
        }
        
        .music-bar:nth-child(1) { animation-delay: 0s; height: 20px; }
        .music-bar:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .music-bar:nth-child(3) { animation-delay: 0.2s; height: 15px; }
        .music-bar:nth-child(4) { animation-delay: 0.3s; height: 35px; }
        .music-bar:nth-child(5) { animation-delay: 0.4s; height: 25px; }
        
        @keyframes musicBounce {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }
        
        .paused .music-bar {
            animation-play-state: paused;
        }
        
        .btn-elegant {
            background: linear-gradient(135deg, var(--accent) 0%, #c4923d 100%);
            color: var(--bg);
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Playfair Display', serif;
        }
        
        .btn-elegant:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(232, 168, 87, 0.4);
        }
        
        .btn-elegant:active {
            transform: translateY(0);
        }
        
        .lang-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--fg);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .lang-btn:hover, .lang-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }
        
        .datetime-display {
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }
        
        .scroll-reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .pantun-card {
            position: relative;
            overflow: hidden;
        }
        
        .pantun-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-rose), var(--accent));
        }
        
        input[type="file"] {
            display: none;
        }
        
        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(232, 168, 87, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .ornament {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        @media (max-width: 768px) {
            .poem-text {
                font-size: 1.1rem !important;
                line-height: 1.8 !important;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="content-wrapper">
        <!-- Header with DateTime -->
        <header class="fixed top-0 left-0 right-0 z-50 p-4">
            <div class="glass-card max-w-4xl mx-auto px-6 py-3 flex flex-wrap items-center justify-between gap-4">

                    <span id="date-display"></span>
                    <span class="mx-2">|</span>
                    <span id="time-display"></span>
                </div>
                <div class="flex gap-2">
                    <button class="lang-btn active" data-lang="id">ID</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="jp">JP</button>
                    <button class="lang-btn" data-lang="de">DE</button>
                </div>
            </div>
        </header>
        
        <!-- Hero Section -->
        <section class="min-h-screen flex items-center justify-center px-4 pt-24 pb-12">
            <div class="text-center max-w-4xl mx-auto">
                <h1 class="font-display text-6xl md:text-8xl font-black mb-6 text-gradient" data-translate="title">
                    Selamat Ulang Tahun
                </h1>
                <p class="text-xl md:text-2xl text-[var(--muted)] mb-8" data-translate="subtitle">
                    Sebuah persembahan kata untuk jiwa yang tercinta
                </p>
                
                <!-- Music Player -->
                <div class="glass-card p-6 max-w-md mx-auto mb-8">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-4">
                            <div class="music-visualizer paused" id="visualizer">
                                <div class="music-bar"></div>
                                <div class="music-bar"></div>
                                <div class="music-bar"></div>
                                <div class="music-bar"></div>
                                <div class="music-bar"></div>
                            </div>
                            <div class="text-left">
                                <p class="text-sm text-[var(--muted)]" data-translate="nowPlaying">Now Playing</p>
                                <p class="font-display text-lg" id="song-name" data-translate="uploadSong">Upload Lagu MP3</p>
                            </div>
                        </div>
                        <button class="btn-elegant" id="play-btn" disabled>
                            <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="progress-bar mb-4">
                        <div class="progress-fill" id="progress"></div>
                    </div>
                    
                    <div class="flex items-center justify-between text-sm text-[var(--muted)]">
                        <span id="current-time">0:00</span>
                        <label class="upload-label btn-elegant text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <span data-translate="chooseFile">Pilih File MP3</span>
                            <input type="file" id="audio-upload" accept=".mp3,audio/mpeg">
                        </label>
                        <span id="duration">0:00</span>
                    </div>
                    
                    <div class="flex items-center gap-2 mt-4">
                        <input type="checkbox" id="loop-toggle" checked class="w-4 h-4 accent-[var(--accent)]">
                        <label for="loop-toggle" class="text-sm text-[var(--muted)]" data-translate="loop">Putar Berulang</label>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Poem Section -->
        <section class="py-20 px-4">
            <div class="max-w-4xl mx-auto">
                <div class="glass-card p-8 md:p-12 accent-glow scroll-reveal">
                    <h2 class="font-display text-3xl md:text-5xl font-bold mb-8 text-center shimmer-text" data-translate="poemTitle">
                        Untukmu yang Berulang Tahun
                    </h2>
                    
                    <div class="poem-text text-lg md:text-xl leading-relaxed text-[var(--fg)]" id="poem-container">
                        <!-- Poem will be inserted here -->
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Pantun Section -->
        <section class="py-20 px-4">
            <div class="max-w-4xl mx-auto">
                <h2 class="font-display text-3xl md:text-5xl font-bold mb-12 text-center text-gradient" data-translate="pantunTitle">
                    Untukmu yang Berulang Tahun
                </h2>
                
                <div class="grid gap-6" id="pantun-container">
                    <!-- Pantun cards will be inserted here -->
                </div>
            </div>
        </section>
        
        <!-- Footer -->
        <footer class="py-12 px-4 text-center">
            <div class="glass-card max-w-2xl mx-auto p-8">
                <p class="font-display text-2xl mb-4" data-translate="footerText">
                    Dengan cinta, dari hati yang paling dalam
                </p>
                <p class="text-[var(--muted)] text-sm">
                    Created with love
                </p>
            </div>
        </footer>
    </div>
    
    <audio id="audio-player" loop></audio>

        let currentLang = 'id';
        
        // ==================== DATE & TIME ====================
        function updateDateTime() {
            const now = new Date();
            
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            
            const localeMap = {
                id: 'id-ID',
                en: 'en-US',
                jp: 'ja-JP',
                de: 'de-DE'
            };
            
            const locale = localeMap[currentLang] || 'id-ID';
            
            document.getElementById('date-display').textContent = now.toLocaleDateString(locale, dateOptions);
            document.getElementById('time-display').textContent = now.toLocaleTimeString(locale, timeOptions);
        }
        
        setInterval(updateDateTime, 1000);
        updateDateTime();
        
        // ==================== TRANSLATION ====================
        function translatePage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (t[key]) {
                    el.innerHTML = t[key];
                }
            });
            
            // Update poem
            document.getElementById('poem-container').innerHTML = t.poem;
            
            // Update pantuns
            renderPantuns(t.pantuns);
            
            // Update button states
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            
            // Update datetime with new locale
            updateDateTime();
        }
        
        function renderPantuns(pantuns) {
            const container = document.getElementById('pantun-container');
            container.innerHTML = pantuns.map((p, i) => `
                <div class="glass-card pantun-card p-6 md:p-8 scroll-reveal" style="transition-delay: ${i * 0.15}s;">
                    <p class="text-[var(--muted)] italic mb-4 text-lg leading-relaxed">${p.sampiran}</p>
                    <p class="text-[var(--accent)] text-xl md:text-2xl font-display font-semibold leading-relaxed">${p.isi}</p>
                </div>
            `).join('');
            
            // Trigger scroll reveal
            setTimeout(observeElements, 100);
        }
        
        // Language buttons
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                translatePage(btn.dataset.lang);
            });
        });
        
        // Initialize with Indonesian
        translatePage('id');
        
        // ==================== MUSIC PLAYER ====================
        const audioPlayer = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const visualizer = document.getElementById('visualizer');
        const progressBar = document.getElementById('progress');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const songNameEl = document.getElementById('song-name');
        const loopToggle = document.getElementById('loop-toggle');
        const audioUpload = document.getElementById('audio-upload');
        
        let isPlaying = false;
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        audioUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audioPlayer.src = url;
                songNameEl.textContent = file.name.replace('.mp3', '');
                playBtn.disabled = false;
                
                audioPlayer.addEventListener('loadedmetadata', () => {
                    durationEl.textContent = formatTime(audioPlayer.duration);
                }, { once: true });
            }
        });
        
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audioPlayer.pause();
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                visualizer.classList.add('paused');
            } else {
                audioPlayer.play();
                playIcon.innerHTML = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
                visualizer.classList.remove('paused');
            }
            isPlaying = !isPlaying;
        });
        
        audioPlayer.addEventListener('timeupdate', () => {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressBar.style.width = `${progress}%`;
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
        });
        
        audioPlayer.addEventListener('ended', () => {
            if (!loopToggle.checked) {
                isPlaying = false;
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                visualizer.classList.add('paused');
            }
        });
        
        loopToggle.addEventListener('change', () => {
            audioPlayer.loop = loopToggle.checked;
        });
        
        // ==================== THREE.JS 3D SCENE ====================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        camera.position.z = 50;
        
        // Particles
        const particleCount = 500;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        
        const colorPalette = [
            new THREE.Color('#e8a857'),
            new THREE.Color('#d4a5a5'),
            new THREE.Color('#f5d89a'),
            new THREE.Color('#ffffff')
        ];
        
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 100;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
            
            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
            
            sizes[i] = Math.random() * 2 + 0.5;
        }
        
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        
        const particleVertexShader = `
            attribute float size;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const particleFragmentShader = `
            varying vec3 vColor;
            void main() {
                float dist = length(gl_PointCoord - vec2(0.5));
                if (dist > 0.5) discard;
                float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                gl_FragColor = vec4(vColor, alpha * 0.8);
            }
        `;
        
        const particleMaterial = new THREE.ShaderMaterial({
            vertexShader: particleVertexShader,
            fragmentShader: particleFragmentShader,
            transparent: true,
            vertexColors: true,
            depthWrite: false
        });
        
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Floating shapes
        const shapes = [];
        const shapeGeometries = [
            new THREE.IcosahedronGeometry(2, 0),
            new THREE.OctahedronGeometry(2, 0),
            new THREE.TetrahedronGeometry(2, 0)
        ];
        
        for (let i = 0; i < 15; i++) {
            const geometry = shapeGeometries[Math.floor(Math.random() * shapeGeometries.length)];
            const material = new THREE.MeshBasicMaterial({
                color: colorPalette[Math.floor(Math.random() * colorPalette.length)],
                wireframe: true,
                transparent: true,
                opacity: 0.4
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 40
            );
            mesh.userData = {
                rotationSpeed: {
                    x: (Math.random() - 0.5) * 0.02,
                    y: (Math.random() - 0.5) * 0.02
                },
                floatSpeed: Math.random() * 0.01 + 0.005,
                floatOffset: Math.random() * Math.PI * 2
            };
            
            shapes.push(mesh);
            scene.add(mesh);
        }
        
        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Rotate particles
            particles.rotation.y += 0.0005;
            particles.rotation.x += 0.0002;
            
            // Animate shapes
            shapes.forEach((shape, i) => {
                shape.rotation.x += shape.userData.rotationSpeed.x;
                shape.rotation.y += shape.userData.rotationSpeed.y;
                shape.position.y += Math.sin(time + shape.userData.floatOffset) * shape.userData.floatSpeed;
            });
            
            renderer.render(scene, camera);
        }
        animate();
        
        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ==================== SCROLL REVEAL ====================
        function observeElements() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });
            
            document.querySelectorAll('.scroll-reveal').forEach(el => {
                observer.observe(el);
            });
        }
        
        observeElements();
        
        // ==================== MOUSE PARALLAX ====================
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            
            camera.position.x = x * 5;
            camera.position.y = y * 5;
            camera.lookAt(0, 0, 0);
        });
    </script>
</body>
